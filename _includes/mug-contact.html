<span class="inline-flex items-center justify-center p-1 bg-primary rounded-md shadow-lg">
    <img class="h-48 w-48" src="{{ include.image }}" alt="{{ include.name }} Image">
</span>
<div class="ml-4">
    <h1 class="text-2xl font-bold">{{ include.name }}</h1>
    <h2 class="text-xl font-semibold mt-2">Contact</h2>
    <table class="table-auto mt-2">
        {% for contact in include.contacts %}
        <tr>
            <td class="pr-4"><strong>{{ contact.type }}:</strong></td>
            <td><a href="{{ contact.url }}" class="text-blue-500">{{ contact.text }}</a></td>
        </tr>
        {% endfor %}
    </table>
</div>
